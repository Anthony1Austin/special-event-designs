<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 160" fill="none" role="img" aria-label="Special Event Designs stacked logo">
  <defs>
    <style>
      .emblem-gold { fill: #fbbf24; }
      .emblem-dark { fill: #1f2937; }
      .emblem-white { fill: #ffffff; }
      .text-dark { fill: #1f2937; font-family: Georgia, 'Times New Roman', serif; font-weight: 700; font-size: 18px; letter-spacing: 0.08em; text-anchor: middle; }
      .tagline-gold { fill: #d97706; font-family: Arial, sans-serif; font-weight: 600; font-size: 9px; letter-spacing: 0.12em; text-anchor: middle; }
    </style>
  </defs>
  <!-- Emblem centered on top -->
  <path class="emblem-gold" d="M110 5 L145 50 L110 95 L75 50 Z"/>
  <path class="emblem-dark" d="M105 18 L135 50 L105 82 L75 50 Z" transform="rotate(-5 105 50)"/>
  <text class="emblem-white" x="105" y="50" font-family="Georgia, serif" font-weight="700" font-size="32" text-anchor="middle" dominant-baseline="middle">S</text>
  <!-- Name -->
  <text class="text-dark" x="110" y="125">SPECIAL EVENT DESIGNS</text>
  <!-- Tagline -->
  <text class="tagline-gold" x="110" y="142">ELEVATING THE ART OF FLORAL DESIGN</text>
</svg>
